<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Shafat Hasan</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav>
            <p>Shafat Hasan</p>
            <a href="index.html">About</a>
        </nav>

        <!-- Contact Header -->
        <section>
            <div class="section-header">
                <div class="section-label">Get in Touch</div>
                <h1 class="section-title">Contact</h1>
                <div class="section-rule"></div>
            </div>
        </section>

        <!-- Contact Form Section -->
        <section class="contact-section">
            <div class="contact-card">
                <!-- Left Panel - Contact Info -->
                <div class="contact-info">
                    <h3>Let's Connect</h3>
                    <div class="contact-details">
                        <div class="contact-item">
                            <span class="contact-icon">📧</span>
                            <div>
                                <strong>Email</strong>
                                <p>smh18904@uga.edu</p>
                            </div>
                        </div>
                        <div class="contact-item">
                            <span class="contact-icon">📱</span>
                            <div>
                                <strong>Phone</strong>
                                <p>678-770-4662</p>
                            </div>
                        </div>
                        <div class="contact-item">
                            <span class="contact-icon">📍</span>
                            <div>
                                <strong>Location</strong>
                                <p>Athens, GA</p>
                            </div>
                        </div>
                    </div>
                    <div class="social-links">
                        <a href="https://www.linkedin.com/in/shafat-hasan-60982a381/" target="_blank" class="social-link">
                            <span>LinkedIn</span>
                        </a>
                        <a href="https://github.com/ShafatHasan" target="_blank" class="social-link">
                            <span>GitHub</span>
                        </a>
                    </div>
                </div>

                <!-- Right Panel - Contact Form -->
                <div class="contact-form">
                    <form method="POST" action="https://formsubmit.co/shafat.ny@gmail.com">
                        <div class="form-group one-col">
                            <input type="text" id="name" name="name" required placeholder=" ">
                            <label for="name">Full Name</label>
                        </div>
                        
                        <div class="form-group one-col">
                            <input type="email" id="email" name="email" required placeholder=" ">
                            <label for="email">Email Address</label>
                        </div>
                        
                        <div class="form-group one-col">
                            <input type="text" id="subject" name="subject" placeholder=" ">
                            <label for="subject">Subject</label>
                        </div>
                        
                        <div class="form-group one-col">
                            <textarea id="message" name="message" required placeholder=" "></textarea>
                            <label for="message">Message</label>
                        </div>
                        
                        <button type="submit" class="btn-primary contact-submit">Send Message</button>
                        
                        <p class="privacy-note">
                            Your information is secure and will only be used to respond to your inquiry.
                        </p>
                    </form>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <a href="index.html">Back to Portfolio</a>
        </footer>
    </div>
</body>
</html>
